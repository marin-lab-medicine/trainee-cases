    <text x="84" y="35" text-anchor="middle" fill="#2f6688" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Limited release</text>
    <text x="84" y="62" text-anchor="middle" fill="#5b6773" font-family="Arial, Helvetica, sans-serif" font-size="15">Document caution</text>
  </g>
