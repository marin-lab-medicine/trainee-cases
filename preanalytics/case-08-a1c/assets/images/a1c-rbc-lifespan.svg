<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">HbA1c weighted glycemia illustration</title>
  <desc id="desc">Stylized erythrocytes of different ages exposed to glucose during the recent month.</desc>
  <rect width="720" height="420" fill="#f6f8f7"/>
  <rect x="36" y="34" width="648" height="352" rx="18" fill="#ffffff" stroke="#d9e3e1" stroke-width="3"/>
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="360" y="72" font-size="22" font-weight="700" fill="#1e2a32">Recent glucose affects the entire</text>
    <text x="360" y="100" font-size="22" font-weight="700" fill="#1e2a32">circulating RBC population</text>
    <text x="360" y="127" font-size="15" fill="#60717a">Older cells have more HbA1c per cell, but all cells continue glycation while circulating.</text>
  </g>
  <defs>
    <radialGradient id="rbc" cx="50%" cy="50%" r="58%">
      <stop offset="0%" stop-color="#f6a2a8"/>
      <stop offset="62%" stop-color="#c83c51"/>
      <stop offset="100%" stop-color="#8f2537"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#1e2a32" flood-opacity=".12"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <ellipse cx="142" cy="236" rx="54" ry="36" fill="url(#rbc)" transform="rotate(-14 142 236)"/>
    <ellipse cx="142" cy="236" rx="24" ry="13" fill="#a82e42" opacity=".38" transform="rotate(-14 142 236)"/>
    <ellipse cx="288" cy="254" rx="58" ry="38" fill="url(#rbc)" transform="rotate(10 288 254)"/>
    <ellipse cx="288" cy="254" rx="26" ry="14" fill="#a82e42" opacity=".42" transform="rotate(10 288 254)"/>
    <ellipse cx="440" cy="232" rx="62" ry="40" fill="url(#rbc)" transform="rotate(-6 440 232)"/>
    <ellipse cx="440" cy="232" rx="28" ry="15" fill="#a82e42" opacity=".48" transform="rotate(-6 440 232)"/>
    <ellipse cx="582" cy="262" rx="64" ry="42" fill="url(#rbc)" transform="rotate(16 582 262)"/>
    <ellipse cx="582" cy="262" rx="30" ry="16" fill="#a82e42" opacity=".54" transform="rotate(16 582 262)"/>
  </g>
  <g fill="#315f8c" opacity=".88">
    <circle cx="102" cy="170" r="7"/>
    <circle cx="205" cy="304" r="6"/>
    <circle cx="246" cy="178" r="7"/>
    <circle cx="358" cy="310" r="6"/>
    <circle cx="390" cy="164" r="7"/>
    <circle cx="520" cy="172" r="6"/>
    <circle cx="638" cy="202" r="7"/>
    <circle cx="505" cy="328" r="6"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#1e2a32">
    <text x="112" y="354">10 days</text>
    <text x="252" y="354">50 days</text>
    <text x="405" y="354">90 days</text>
    <text x="535" y="354">115 days</text>
  </g>
  <path d="M92 158 C218 130 494 130 628 158" fill="none" stroke="#0f766e" stroke-width="5" stroke-linecap="round"/>
  <path d="M604 142 L631 158 L603 175" fill="none" stroke="#0f766e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
