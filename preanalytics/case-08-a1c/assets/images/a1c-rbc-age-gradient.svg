<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">RBC age and per-cell HbA1c</title>
  <desc id="desc">Erythrocyte age gradient showing more accumulated HbA1c in older cells.</desc>
  <rect width="640" height="360" fill="#ffffff"/>
  <rect x="28" y="28" width="584" height="304" rx="16" fill="#f6f8f7" stroke="#d9e3e1" stroke-width="3"/>
  <text x="56" y="72" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#1e2a32">Per-cell HbA1c rises with erythrocyte age</text>
  <line x1="92" y1="258" x2="548" y2="258" stroke="#60717a" stroke-width="3"/>
  <path d="M532 242 L558 258 L532 274" fill="none" stroke="#60717a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <defs>
    <radialGradient id="cell1" cx="50%" cy="50%" r="58%">
      <stop offset="0%" stop-color="#ffc0c4"/>
      <stop offset="70%" stop-color="#d95766"/>
      <stop offset="100%" stop-color="#b53448"/>
    </radialGradient>
  </defs>
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <g>
      <ellipse cx="130" cy="176" rx="48" ry="32" fill="url(#cell1)" transform="rotate(-10 130 176)"/>
      <ellipse cx="130" cy="176" rx="20" ry="10" fill="#a62d40" opacity=".26" transform="rotate(-10 130 176)"/>
      <text x="130" y="287" font-size="14" font-weight="700" fill="#1e2a32">10-day cell</text>
      <text x="130" y="308" font-size="13" fill="#60717a">lower per-cell HbA1c</text>
    </g>
    <g>
      <ellipse cx="320" cy="176" rx="58" ry="38" fill="url(#cell1)" transform="rotate(8 320 176)"/>
      <ellipse cx="320" cy="176" rx="26" ry="13" fill="#a62d40" opacity=".42" transform="rotate(8 320 176)"/>
      <text x="320" y="287" font-size="14" font-weight="700" fill="#1e2a32">60-day cell</text>
      <text x="320" y="308" font-size="13" fill="#60717a">intermediate</text>
    </g>
    <g>
      <ellipse cx="508" cy="176" rx="68" ry="44" fill="url(#cell1)" transform="rotate(-5 508 176)"/>
      <ellipse cx="508" cy="176" rx="32" ry="16" fill="#a62d40" opacity=".58" transform="rotate(-5 508 176)"/>
      <text x="508" y="287" font-size="14" font-weight="700" fill="#1e2a32">110-day cell</text>
      <text x="508" y="308" font-size="13" fill="#60717a">highest per-cell HbA1c</text>
    </g>
  </g>
</svg>
